version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: meal_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
